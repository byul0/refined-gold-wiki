<style>
:root {
  --bg: #0f1117; --sidebar: #161822; --card: #1c1f2e;
  --card-header: #1a1d2d; --border: #2a2d3e; --text: #e4e6f0;
  --text-dim: #8b8fa3; --accent: #f0c040; --accent2: #4a9eff;
  --table-head: rgba(20,22,34,0.5);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Nunito', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); display: flex; min-height: 100vh; }

/* Sidebar */
#sidebar {
  width: 270px; min-width: 270px; background: var(--sidebar);
  border-right: 1px solid var(--border); overflow-y: auto;
  height: 100vh; position: sticky; top: 0; transition: all 0.25s ease;
}
#sidebar.closed { width: 0; min-width: 0; overflow: hidden; }
#sidebar-header { padding: 20px 16px 12px; }
#sidebar-header h1 { font-size: 15px; font-weight: 800; color: var(--accent); letter-spacing: -0.3px; }
#sidebar-header p { font-size: 11px; color: var(--text-dim); margin: 4px 0 16px; }
#search {
  width: 100%; padding: 8px 12px; border: 1px solid var(--border);
  border-radius: 6px; background: var(--bg); color: var(--text);
  font-size: 13px; outline: none; font-family: inherit;
}
.region-label {
  padding: 8px 16px; font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--accent2); background: rgba(74,158,255,0.06);
}
.loc-btn {
  display: block; width: 100%; text-align: left;
  padding: 9px 16px 9px 24px; border: none; cursor: pointer;
  background: transparent; color: var(--text-dim);
  font-weight: 400; font-size: 13px; font-family: inherit;
  border-left: 3px solid transparent; transition: all 0.15s;
}
.loc-btn:hover { background: rgba(255,255,255,0.03); color: var(--text); }
.loc-btn.active {
  background: rgba(240,192,64,0.1); color: var(--accent);
  font-weight: 700; border-left-color: var(--accent);
}

/* Toggle button */
#toggle-btn {
  position: fixed; top: 12px; left: 278px; z-index: 10;
  background: var(--card); border: 1px solid var(--border); border-radius: 6px;
  color: var(--text-dim); cursor: pointer; padding: 6px 10px; font-size: 16px;
  transition: left 0.25s ease;
}
#toggle-btn.shifted { left: 8px; }

/* Main content */
#main { flex: 1; padding: 32px 40px; max-width: 920px; min-width: 0; }
.region-tag {
  font-size: 12px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 1px; color: var(--accent2);
}
.location-title {
  font-size: 32px; font-weight: 800; margin: 4px 0 0;
  background: linear-gradient(135deg, var(--accent), #ff9f43);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.card {
  background: var(--card); border-radius: 12px;
  border: 1px solid var(--border); padding: 24px; margin-top: 24px;
}

/* Encounter tables */
.enc-section { margin-bottom: 28px; }
.enc-header {
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 700; color: var(--text);
  margin: 0 0 12px 0; padding: 8px 14px;
  background: var(--card-header); border-radius: 8px 8px 0 0;
  border-bottom: 2px solid var(--accent);
}
.enc-header span { font-size: 20px; }
.enc-table { width: 100%; border-collapse: collapse; font-size: 14px; }
.enc-table thead tr { background: var(--table-head); text-align: left; }
.enc-table th {
  padding: 8px 14px; font-weight: 600; color: var(--text-dim);
  font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px;
}
.enc-table td { padding: 8px 14px; border-bottom: 1px solid var(--border); }
.enc-table .poke-cell { display: flex; align-items: center; gap: 10px; min-height: 52px; }
.poke-name { font-weight: 600; color: var(--text); }
.poke-rate { font-weight: 700; color: var(--accent); font-family: 'JetBrains Mono', monospace; }
.poke-cond { color: var(--text-dim); font-size: 13px; }
.type-badge {
  display: inline-block; padding: 2px 10px; border-radius: 4px;
  font-size: 11px; font-weight: 700; text-transform: uppercase;
  letter-spacing: 0.5px; color: #fff; line-height: 18px;
}

/* Sprite */
.sprite-wrap {
  width: 48px; height: 48px; flex-shrink: 0; display: flex;
  align-items: center; justify-content: center;
  background: radial-gradient(circle, rgba(255,255,255,0.06) 0%, transparent 70%);
  border-radius: 8px;
}
.sprite-wrap img {
  width: 44px; height: 44px; image-rendering: pixelated;
  object-fit: contain; filter: drop-shadow(0 1px 3px rgba(0,0,0,0.5));
}

footer {
  margin-top: 48px; padding: 16px 0; border-top: 1px solid var(--border);
  font-size: 12px; color: var(--text-dim); text-align: center;
}

@media (max-width: 768px) {
  #sidebar { position: fixed; z-index: 20; height: 100vh; }
  #main { padding: 20px 16px; }
  .location-title { font-size: 24px; }
  #toggle-btn { left: 8px !important; }
  #toggle-btn.open { left: 278px !important; }
}
</style>

let currentLocation = "Route 29";

function getSpriteUrl(name) {
  const id = getPokemonId(name);
  if (!id) return null;
  return `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${id}.png`;
}

function buildSidebar(filter = "") {
  const list = document.getElementById("sidebar-list");
  let html = "";
  for (const [region, locs] of Object.entries(REGIONS)) {
    const filtered = locs.filter(l => l.toLowerCase().includes(filter.toLowerCase()));
    if (!filtered.length) continue;
    html += `<div class="region-label">${region}</div>`;
    for (const loc of filtered) {
      const icon = ENCOUNTER_DATA[loc]?.type === "dungeon" ? "🏔" : "🛤";
      const active = loc === currentLocation ? " active" : "";
      html += `<button class="loc-btn${active}" onclick="selectLocation('${loc.replace(/'/g, "\\'")}')">${icon} ${loc}</button>`;
    }
  }
  list.innerHTML = html;
}

function renderEncounterTable(title, icon, encounters) {
  if (!encounters || !encounters.length) return "";
  let rows = "";
  for (const e of encounters) {
    const type = getType(e.pokemon);
    const color = TYPE_COLORS[type] || TYPE_COLORS.Normal;
    const spriteUrl = getSpriteUrl(e.pokemon);
    const spriteHtml = spriteUrl
      ? `<div class="sprite-wrap"><img src="${spriteUrl}" alt="${e.pokemon}" loading="lazy" onerror="this.style.display='none'"></div>`
      : `<div class="sprite-wrap" style="font-size:20px">?</div>`;
    rows += `<tr>
      <td><div class="poke-cell">${spriteHtml}<span class="poke-name">${e.pokemon}</span></div></td>
      <td><span class="type-badge" style="background:${color}">${type}</span></td>
      <td class="poke-rate">${e.rate}</td>
      <td class="poke-cond">${e.time || e.method || "—"}</td>
    </tr>`;
  }
  return `<div class="enc-section">
    <h3 class="enc-header"><span>${icon}</span> ${title}</h3>
    <div style="overflow-x:auto">
      <table class="enc-table">
        <thead><tr><th>Pokémon</th><th>Type</th><th>Rate</th><th>Condition</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

function selectLocation(loc) {
  currentLocation = loc;
  const data = ENCOUNTER_DATA[loc];
  if (!data) return;

  let html = `<span class="region-tag">${data.region} — ${data.type === "dungeon" ? "Donjon" : "Route"}</span>
    <h2 class="location-title">${loc}</h2>
    <div class="card">`;
  html += renderEncounterTable("Tall Grass / Walking", "🌿", data.walking);
  html += renderEncounterTable("Surfing", "🌊", data.surfing);
  html += renderEncounterTable("Fishing", "🎣", data.fishing);
  html += renderEncounterTable("Radio Encounters", "📻", data.radio);
  html += renderEncounterTable("Rock Smash", "🪨", data.rockSmash);
  html += renderEncounterTable("Headbutt", "🌳", data.headbutt);
  html += `</div>`;

  document.getElementById("content").innerHTML = html;
  buildSidebar(document.getElementById("search").value);
}

function toggleSidebar() {
  sidebarOpen = !sidebarOpen;
  document.getElementById("sidebar").classList.toggle("closed", !sidebarOpen);
  const btn = document.getElementById("toggle-btn");
  btn.textContent = sidebarOpen ? "◀" : "▶";
  btn.classList.toggle("shifted", !sidebarOpen);
  btn.classList.toggle("open", sidebarOpen);
}

// Init
document.getElementById("search").addEventListener("input", (e) => buildSidebar(e.target.value));
buildSidebar();
selectLocation("Route 29");
</script>
</body>
</html>
